overlay:
    image: siderolabs/sbc-raspberrypi
    name: rpi_generic
    options:
        configTxt: |
            gpu_mem=32
            kernel=u-boot.bin
            arm_64bit=1
            arm_boost=1
            dtoverlay=disable-bt
            dtoverlay=disable-wifi
            dtoverlay=gpio-fan,gpiopin=14

